<!DOCTYPE html>

<head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
height:100vh;
background:#050505;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#c8a24833,transparent 70%);
filter:blur(60px);
}

.container{
position:relative;
text-align:center;
z-index:2;
padding:20px;
max-width:800px;
}

.logo{
font-size:72px;
font-weight:700;
letter-spacing:14px;
color:#d4af37;
}

.tagline{
margin-top:12px;
font-size:20px;
color:#bbbbbb;
letter-spacing:3px;
}

.coming{
margin-top:70px;
font-size:64px;
font-weight:700;
}

.desc{
margin-top:20px;
font-size:20px;
line-height:1.8;
color:#bdbdbd;
}

.line{
margin:45px auto;
width:120px;
height:2px;
background:#d4af37;
}

.email{
margin-top:20px;
font-size:18px;
color:#ffffff;
}

.footer{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
font-size:14px;
color:#888;
letter-spacing:2px;
}

@media(max-width:768px){

.logo{
font-size:46px;
letter-spacing:8px;
}

.coming{
font-size:42px;
}

.desc{
font-size:18px;
}

}

</style>

</head>

<body>

<div class="container">

<h1 class="logo">haeksha mokshitha sisters </h1>
<p class="tagline">best sisters</p>

<h2 class="coming">comming soon their birthday</h2>

<p class="desc">
We're building something extraordinary.<br>

</p>

<p class="email">
</p>

</div>

<div class="footer">

</div>
